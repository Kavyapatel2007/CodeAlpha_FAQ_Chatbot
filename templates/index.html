<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI FAQ Chatbot</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    background:linear-gradient(135deg,#0f172a,#1e293b,#312e81);
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.container{
    width:450px;
    height:650px;
    background:rgba(255,255,255,.08);
    backdrop-filter:blur(20px);
    border-radius:25px;
    overflow:hidden;
    display:flex;
    flex-direction:column;
    box-shadow:0 20px 50px rgba(0,0,0,.4);
}

.header{
    background:#2563eb;
    color:white;
    padding:20px;
    text-align:center;
    font-size:24px;
    font-weight:bold;
}

#chat{
    flex:1;
    padding:20px;
    overflow-y:auto;
}

.user{
    background:#2563eb;
    color:white;
    padding:12px;
    border-radius:15px;
    margin:10px 0;
    margin-left:60px;
}

.bot{
    background:#334155;
    color:white;
    padding:12px;
    border-radius:15px;
    margin:10px 0;
    margin-right:60px;
}

.bottom{
    display:flex;
    padding:15px;
    gap:10px;
    background:#111827;
}

input{
    flex:1;
    padding:12px;
    border:none;
    border-radius:10px;
    font-size:15px;
    outline:none;
}

button{
    background:#2563eb;
    color:white;
    border:none;
    border-radius:10px;
    padding:12px 18px;
    cursor:pointer;
    font-weight:bold;
}

button:hover{
    background:#1d4ed8;
}
</style>

</head>
<body>

<div class="container">

<div class="header">
🤖 AI FAQ Chatbot
</div>

<div id="chat"></div>

<div class="bottom">
<input
type="text"
id="message"
placeholder="Ask a question..."
onkeypress="if(event.key==='Enter') sendMessage()">

<button onclick="sendMessage()">Send</button>
</div>

</div>

<script>

function sendMessage(){

let message=document.getElementById("message").value;

if(message.trim()=="") return;

document.getElementById("chat").innerHTML +=
"<div class='user'><b>You:</b><br>"+message+"</div>";

fetch("/chat",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
message:message
})

})

.then(response=>response.json())

.then(data=>{

document.getElementById("chat").innerHTML +=
"<div class='bot'><b>Bot:</b><br>"+data.response+"</div>";

document.getElementById("message").value="";

document.getElementById("chat").scrollTop=document.getElementById("chat").scrollHeight;

});

}

</script>

</body>
</html>
